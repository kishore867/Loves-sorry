<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#12071d,#1b0a2a,#3b185f);
font-family:'Quicksand',sans-serif;
overflow:hidden;
opacity:0;
transition:opacity 0.8s ease;
}

body.loaded{
opacity:1;
}

/* CARD */
.card{
text-align:center;
padding:38px 26px;
border-radius:28px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px); /* 🔧 reduce heavy blur */
box-shadow:0 0 30px rgba(255,105,180,0.25);
max-width:390px;
color:white;
position:relative;
z-index:2;

opacity:0;
transform:translateY(40px) scale(0.95);
animation:cardIn 0.9s ease forwards; /* 🔧 faster */
}

@keyframes cardIn{
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

/* glow */
.glow{
position:absolute;
width:260px; /* 🔧 reduce size */
height:260px;
border-radius:50%;
filter:blur(70px); /* 🔧 reduce lag */
opacity:0.25;
}

.g1{background:#ff4fa3;top:-90px;left:-90px;}
.g2{background:#8e6cff;bottom:-90px;right:-90px;}

/* IMAGE FRAME */
.circle-frame{
width:260px;
height:260px;
margin:0 auto 18px;
border-radius:50%;
padding:12px;
background:radial-gradient(circle,#ff4fa3,#8e6cff,#ff9fc7);
box-shadow:0 0 30px hotpink;
display:flex;
justify-content:center;
align-items:center;

animation:imgIn 1s ease forwards 0.3s, floatImg 3s ease-in-out infinite; /* 🔧 FIXED double animation bug */
opacity:0;
transform:translateY(-20px) scale(0.8);
}

@keyframes imgIn{
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

.profile{
width:100%;
height:100%;
border-radius:50%;
object-fit:contain;
background:#0d0618;
padding:5px;
}

@keyframes floatImg{
0%{transform:translateY(0);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0);}
}

/* TEXT */
.text, .small, .decor{
opacity:0;
transform:translateY(20px);
animation:fadeUp 0.9s ease forwards;
}

.text:nth-of-type(1){animation-delay:0.5s;}
.text:nth-of-type(2){animation-delay:0.8s;}
.small{animation-delay:1.1s;}
.decor{animation-delay:0.2s;}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.text{
font-size:24px;
font-family:'Dancing Script',cursive;
margin:10px 0;
color:#ffe6f5;
text-shadow:0 0 10px rgba(255,105,180,0.6);
}

.small{
font-size:18px;
margin-top:12px;
font-family:'Great Vibes',cursive;
color:#ffe6f5;
text-shadow:0 0 12px hotpink;
}

/* decorations */
.decor{
font-size:22px;
animation:float 2.5s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-5px);}
100%{transform:translateY(0);}
}

/* hearts */
.heart{
position:absolute;
font-size:14px;
opacity:0.6;
animation:floatUp linear infinite;
will-change: transform; /* 🔧 performance boost */
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

/* PAGE EXIT */
.fade-out{
opacity:0 !important;
transform:scale(0.98);
transition:0.6s ease; /* 🔧 smoother */
}

</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="card">

<div class="decor">🧸💖🧸</div>

<div class="circle-frame">
<img src="photo.jpg" class="profile">
</div>

<div class="decor">💗✨💗</div>

<div class="text">Hey Welcome Drashti Tiwari 💖</div>
<div class="text">I missed you very much 🥺</div>

<div class="small">Sorry Khushi 💖 I really miss you</div>

</div>

<script>

/* MUSIC */
let music=document.getElementById("bgMusic");
music.volume=0.15;

/* restore */
let savedTime = localStorage.getItem("musicTime");
if(savedTime){
music.currentTime = savedTime;
}

window.addEventListener("load",()=>{
document.body.classList.add("loaded");

music.play().catch(()=>{
document.body.addEventListener("click",()=>music.play(),{once:true});
});
});

/* 🔧 reduce lag (1s once instead of 0.5 continuous heavy write) */
setInterval(()=>{
localStorage.setItem("musicTime", music.currentTime);
},1000);

/* HEARTS (reduced count 🔧) */
let emojis=["💖","💗","🫶","💞"];

for(let i=0;i<10;i++){ /* 🔧 15 → 10 */
let h=document.createElement("div");
h.className="heart";
h.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*3)+"s";
document.body.appendChild(h);
}

/* AUTO NEXT */
setTimeout(()=>{
document.body.classList.add("fade-out");

setTimeout(()=>{
window.location.href="index2.html";
},600); /* 🔧 faster switch */

},5000);

</script>

</body>
</html>
