<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Story 💖</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:#000;
}

/* frame style */
iframe{
width:100%;
height:100%;
border:none;

/* cute transition */
opacity:0;
transform:scale(1.03);
filter:blur(6px);
transition:all 0.6s ease;
}

iframe.show{
opacity:1;
transform:scale(1);
filter:blur(0);
}
</style>
</head>

<body>

<!-- first page load -->
<iframe id="frame" src="index.html"></iframe>

<script>

const frame = document.getElementById("frame");

/* show animation */
frame.onload = () => {
frame.classList.add("show");
};

/* catch ALL navigation (links) */
document.addEventListener("click", function(e){

let a = e.target.closest("a");
if(!a) return;

let link = a.getAttribute("href");
if(!link) return;

e.preventDefault();

/* smooth transition */
frame.classList.remove("show");

setTimeout(()=>{
frame.src = link;
},500);

});

</script>

</body>
</html>
