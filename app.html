<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Story 💖</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:#000;
}

/* iframe */
iframe{
width:100%;
height:100%;
border:none;
}

/* back button */
#backBtn{
position:fixed;
bottom:20px;
left:20px;
z-index:9999;

padding:10px 18px;
border:none;
border-radius:25px;

background:#ff5ea8;
color:white;
font-family:cursive;
font-size:16px;
}
</style>
</head>

<body>

<button id="backBtn">💖 Back</button>

<iframe id="frame" src="index.html"></iframe>

<script>

const frame = document.getElementById("frame");

/* SIMPLE STACK */
let stack = ["index.html"];
let i = 0;

/* OPEN NEW PAGE */
document.addEventListener("click",(e)=>{
let a = e.target.closest("a");
if(!a) return;

e.preventDefault();

let link = a.getAttribute("href");

i++;
stack[i] = link;

frame.src = link;
});

/* BACK BUTTON */
document.getElementById("backBtn").addEventListener("click",()=>{

if(i > 0){
i--;
frame.src = stack[i];
}else{
frame.src = "index.html";
i = 0;
}

});

</script>

</body>
</html>
