<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Story 💖</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:#000;
font-family:sans-serif;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:#0f0f14;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
z-index:10;
transition:0.6s;
}

#loader h2{
font-family:cursive;
color:pink;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

/* iframe */
iframe{
width:100%;
height:100%;
border:none;
opacity:0;
transform:scale(1.05);
filter:blur(10px);
transition:all 0.7s ease;
}

iframe.show{
opacity:1;
transform:scale(1);
filter:blur(0);
}

/* floating hearts */
.heart{
position:absolute;
bottom:-20px;
font-size:18px;
animation:floatUp linear infinite;
opacity:0.7;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
<h2>Loading Love... 💖</h2>
</div>

<!-- MAIN FRAME -->
<iframe id="frame" src="index.html"></iframe>

<script>

const frame = document.getElementById("frame");
const loader = document.getElementById("loader");

/* FIRST LOAD */
frame.onload = () => {

setTimeout(()=>{
loader.style.opacity = "0";
setTimeout(()=>loader.style.display="none",600);
},800);

frame.classList.add("show");
};

/* PAGE CHANGE TRANSITION */
function loadPage(url){

frame.classList.remove("show");

setTimeout(()=>{
frame.src = url;
},400);
}

/* INTERCEPT ALL LINK CLICKS */
document.addEventListener("click", function(e){

let a = e.target.closest("a");
if(!a) return;

let link = a.getAttribute("href");
if(!link) return;

e.preventDefault();

loadPage(link);

});

/* FLOATING HEARTS (LIGHT) */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);
},1200);

</script>

</body>
</html>
